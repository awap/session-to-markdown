<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Session to Markdown</h1>
  <button id="save" data-i18n="saveButton"></button>
  <p id="version"></p>
  <p id="status"></p>

  <details id="settings">
    <summary data-i18n="settingsSummary"></summary>
    <label class="radio">
      <input type="radio" name="mode" value="session" />
      <span data-i18n="modeSession"></span> <span class="hint" data-i18n="modeSessionHint"></span>
    </label>
    <label class="radio">
      <input type="radio" name="mode" value="obsidian" />
      <span data-i18n="modeObsidian"></span> <span class="hint" data-i18n="modeObsidianHint"></span>
    </label>
    <div id="obsidianFields">
      <label class="field"><span data-i18n="noteFolderLabel"></span>
        <input type="text" id="noteFolder" data-i18n-ph="noteFolderPh" />
      </label>
      <label class="field"><span data-i18n="attachmentFolderLabel"></span>
        <input type="text" id="attachmentFolder" data-i18n-ph="attachmentFolderPh" />
      </label>
      <p class="hint" data-i18n="hintFreeInput"></p>
      <p class="hint" data-i18n="hintVaultRoot"></p>
    </div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
